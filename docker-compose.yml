services:
  db:
    image: postgres:16-alpine
    container_name: wiki-jujutsu-db
    environment:
      POSTGRES_DB: wiki_jujutsu_kaisen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wiki_jujutsu_kaisen"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend-java
      dockerfile: Dockerfile
    container_name: wiki-jujutsu-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/wiki_jujutsu_kaisen
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080/backend-java/api
    container_name: wiki-jujutsu-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8080/backend-java/api
    ports:
      - "${FRONTEND_PORT:-5173}:5173"

volumes:
  postgres_data:
